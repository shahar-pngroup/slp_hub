<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שירות סוכנים - מוניטור</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0f1117;color:#fff;direction:rtl;font-family:Arial,sans-serif;}
.dash{height:100vh;padding:14px;display:grid;grid-template-rows:auto auto 1fr;gap:12px;}
.topbar{display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:22px;font-weight:500;}
.clock{font-size:28px;font-weight:500;color:#60a5fa;font-family:monospace;}
.fs-btn{background:#1a1f2e;border:0.5px solid #2d3448;color:#8892a4;border-radius:6px;padding:6px 16px;font-size:14px;cursor:pointer;}
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.metric{background:#1a1f2e;border:0.5px solid #2d3448;border-radius:10px;padding:14px 16px;text-align:center;}
.metric-label{font-size:13px;color:#8892a4;margin-bottom:6px;}
.metric-value{font-size:30px;font-weight:500;}
.metric-sub{font-size:12px;color:#8892a4;margin-top:4px;}
.main{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;min-height:0;}
.col{display:flex;flex-direction:column;gap:12px;min-height:0;}
.card{background:#1a1f2e;border:0.5px solid #2d3448;border-radius:10px;padding:16px;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
.card-title{font-size:15px;color:#8892a4;margin-bottom:12px;font-weight:500;flex-shrink:0;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-name{font-size:15px;color:#cbd5e1;width:130px;min-width:130px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;background:#2d3448;border-radius:4px;height:22px;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;}
.bar-num{font-size:16px;font-weight:600;color:#fff;min-width:26px;text-align:right;}
.calls-scroll{overflow-y:auto;flex:1;}
.call-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid #2d3448;font-size:14px;}
.call-row:last-child{border:none;}
.call-num{color:#60a5fa;min-width:48px;font-weight:600;font-size:15px;}
.call-slp{color:#cbd5e1;min-width:80px;font-size:14px;}
.call-issue{color:#8892a4;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px;}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;white-space:nowrap;background:#1a2a3a;color:#94a3b8;}
.empty-msg{color:#8892a4;font-size:14px;padding:12px 0;}
.m-blue{color:#60a5fa;}
.m-green{color:#34d399;}
.m-red{color:#f87171;}
.m-amber{color:#fbbf24;}
.m-teal{color:#2dd4bf;}
.m-purple{color:#c084fc;}
.popup-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center;}
.popup-overlay.show{display:flex;}
.popup-box{background:#0f1117;border:2px solid #3b6fd4;border-radius:20px;padding:40px 64px;text-align:center;}
.popup-label{font-size:16px;color:#93c5fd;letter-spacing:3px;margin-bottom:10px;}
.popup-name{font-size:36px;font-weight:500;color:#fff;}
.popup-sub{font-size:16px;color:#8892a4;margin-top:10px;}
@keyframes blink{0%,100%{border-color:#3b6fd4;}50%{border-color:#60a5fa;}}
.popup-box.blink{animation:blink 0.6s ease 5;}
</style>
</head>
<body>

<div class="popup-overlay" id="popup">
  <div class="popup-box" id="popup-box">
    <div class="popup-label">קריאה חדשה</div>
    <div class="popup-name" id="popup-name"></div>
    <div class="popup-sub" id="popup-sub"></div>
  </div>
</div>

<div class="dash">

  <div class="topbar">
    <div class="topbar-title">שירות סוכנים - מוניטור יומי</div>
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="fs-btn" onclick="toggleFS()">מסך מלא</button>
      <div class="clock" id="clk">--:--:--</div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">קריאות היום</div><div class="metric-value m-blue" id="m-total">-</div><div class="metric-sub">סך הכל</div></div>
    <div class="metric"><div class="metric-label">פתוחות כרגע</div><div class="metric-value m-amber" id="m-open">-</div><div class="metric-sub">לא סגורות</div></div>
    <div class="metric"><div class="metric-label">סגורות היום</div><div class="metric-value m-green" id="m-done">-</div><div class="metric-sub" id="m-pct"></div></div>
    <div class="metric"><div class="metric-label">עברו SLA</div><div class="metric-value m-red" id="m-sla">-</div><div class="metric-sub">מעל 10 דקות</div></div>
    <div class="metric"><div class="metric-label">זמן תגובה ממוצע</div><div class="metric-value m-teal" id="m-resp">-</div><div class="metric-sub"></div></div>
    <div class="metric"><div class="metric-label">זמן טיפול ממוצע</div><div class="metric-value m-purple" id="m-close">-</div><div class="metric-sub"></div></div>
  </div>

  <div class="main">

    <div class="col">
      <div class="card">
        <div class="card-title">קריאות לפי תומכת — היום</div>
        <div id="bars-supporter"></div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <div class="card-title">קריאות לפי סוכן — היום</div>
        <div id="bars-slp"></div>
      </div>
    </div>

    <div class="col">
      <div class="card" style="flex:0 0 auto;max-height:45%;">
        <div class="card-title">קריאות חדשות</div>
        <div class="calls-scroll" id="new-list"></div>
      </div>
      <div class="card">
        <div class="card-title">קריאות בטיפול</div>
        <div class="calls-scroll" id="inprogress-list"></div>
      </div>
    </div>

  </div>
</div>

<audio id="ping" preload="auto">
  <source src="/static/ping.wav" type="audio/wav">
</audio>

<script>
const COLORS=['#3b82f6','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ec4899','#f43f5e','#84cc16'];
let seenCalls=new Set(), firstLoad=true;

function tick(){
  const d=new Date();
  document.getElementById('clk').textContent=
    String(d.getHours()).padStart(2,'0')+':'+
    String(d.getMinutes()).padStart(2,'0')+':'+
    String(d.getSeconds()).padStart(2,'0');
}
tick(); setInterval(tick,1000);

function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

function renderBars(elId, obj){
  const entries=Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  const mx=entries[0]?.[1]||1;
  document.getElementById(elId).innerHTML=entries.map(([n,c],i)=>
    '<div class="bar-row">'+
      '<div class="bar-name">'+n+'</div>'+
      '<div class="bar-track">'+
        '<div class="bar-fill" style="width:'+Math.round(c/mx*100)+'%;background:'+COLORS[i%COLORS.length]+';"></div>'+
      '</div>'+
      '<div class="bar-num">'+c+'</div>'+
    '</div>'
  ).join('');
}

function renderList(elId, rows){
  document.getElementById(elId).innerHTML = rows.length
    ? rows.map(r=>
        '<div class="call-row">'+
        '<span class="call-num">#'+r.call_num+'</span>'+
        '<span class="call-slp">'+r.slp_name+'</span>'+
        '<span class="call-issue">'+r.slp_issue+'</span>'+
        '<span class="badge">'+r.status+'</span>'+
        '</div>'
      ).join('')
    : '<div class="empty-msg">אין קריאות</div>';
}

function showPopup(name,num){
  document.getElementById('popup-name').textContent=name||'סוכן';
  document.getElementById('popup-sub').textContent='קריאה #'+num+' נפתחה כעת';
  const ov=document.getElementById('popup'),bx=document.getElementById('popup-box');
  ov.classList.add('show'); bx.classList.add('blink');
  try{document.getElementById('ping').play();}catch(e){}
  setTimeout(()=>{ov.classList.remove('show');bx.classList.remove('blink');},10000);
}

async function refresh(){
  try{
    const data=await(await fetch('/api/dashboard')).json();
    document.getElementById('m-total').textContent = data.total;
    document.getElementById('m-open').textContent  = data.open;
    document.getElementById('m-done').textContent  = data.done;
    document.getElementById('m-sla').textContent   = data.sla_breach;
    document.getElementById('m-resp').textContent  = data.avg_response;
    document.getElementById('m-close').textContent = data.avg_close;
    const pct=data.total>0?Math.round(data.done/data.total*100):0;
    document.getElementById('m-pct').textContent=pct+'% מהסך הכל';
    renderBars('bars-supporter', data.by_supporter);
    renderBars('bars-slp',       data.by_slp);
    renderList('new-list',        data.new_calls_list);
    renderList('inprogress-list', data.inprogress_list);
    if(!firstLoad) for(const nc of(data.new_calls||[])){
      if(!seenCalls.has(''+nc.call_num)){
        seenCalls.add(''+nc.call_num);
        showPopup(nc.slp_name,nc.call_num);
        break;
      }
    }
    if(firstLoad){firstLoad=false;(data.new_calls||[]).forEach(nc=>seenCalls.add(''+nc.call_num));}
  }catch(e){console.error(e);}
}
refresh();
setInterval(refresh,30000);
</script>
</body>
</html>
